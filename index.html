<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>삼성전자 재무제표 대시보드</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f4;
      --panel: #ffffff;
      --panel-soft: #f0f5f3;
      --ink: #202124;
      --muted: #687076;
      --line: #d9dfdc;
      --teal: #007d7a;
      --green: #3c7a3e;
      --amber: #a96700;
      --red: #b4473f;
      --violet: #6657b8;
      --shadow: 0 10px 24px rgba(30, 36, 34, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: "Segoe UI", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      line-height: 1.45;
    }

    button,
    input,
    select {
      font: inherit;
    }

    .topbar {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 24px;
      padding: 28px 32px 20px;
      border-bottom: 1px solid var(--line);
      background: #fbfcfa;
    }

    .eyebrow {
      margin: 0 0 6px;
      color: var(--teal);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    h1,
    h2,
    h3,
    p {
      margin: 0;
    }

    h1 {
      font-size: 30px;
      line-height: 1.1;
    }

    h2 {
      font-size: 17px;
      line-height: 1.2;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 320px;
      justify-content: flex-end;
    }

    .status {
      max-width: 360px;
      color: var(--muted);
      font-size: 13px;
      text-align: right;
    }

    .company-select {
      min-width: 260px;
      max-width: 360px;
    }

    .file-button {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 38px;
      padding: 0 14px;
      border: 1px solid var(--teal);
      border-radius: 6px;
      color: #ffffff;
      background: var(--teal);
      cursor: pointer;
      white-space: nowrap;
    }

    .file-button input {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }

    .shell {
      width: min(1440px, 100%);
      margin: 0 auto;
      padding: 24px 32px 36px;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(6, minmax(140px, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }

    .metric-card,
    .chart-panel,
    .side-panel,
    .table-area {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .metric-card {
      min-height: 120px;
      padding: 16px;
    }

    .metric-card h3 {
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
    }

    .metric-value {
      margin-top: 14px;
      font-size: 24px;
      font-weight: 800;
      line-height: 1.05;
      word-break: keep-all;
    }

    .metric-change {
      margin-top: 12px;
      font-size: 13px;
      color: var(--muted);
    }

    .metric-change.up {
      color: var(--green);
    }

    .metric-change.down {
      color: var(--red);
    }

    .chart-panel {
      padding: 18px;
      margin-bottom: 16px;
    }

    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 14px;
    }

    .section-head p {
      margin-top: 5px;
      color: var(--muted);
      font-size: 13px;
    }

    select,
    .search {
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #ffffff;
      color: var(--ink);
      padding: 0 12px;
      outline: none;
    }

    select:focus,
    .search:focus {
      border-color: var(--teal);
      box-shadow: 0 0 0 3px rgba(0, 125, 122, 0.14);
    }

    .trend-chart {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      align-items: end;
      gap: 18px;
      min-height: 230px;
      padding: 10px 4px 0;
    }

    .trend-column {
      display: grid;
      grid-template-rows: 1fr auto auto;
      min-height: 210px;
      gap: 8px;
    }

    .trend-bar-wrap {
      position: relative;
      display: flex;
      align-items: flex-end;
      min-height: 160px;
      border-bottom: 1px solid var(--line);
    }

    .trend-bar {
      width: 100%;
      min-height: 4px;
      border-radius: 6px 6px 0 0;
      background: var(--teal);
    }

    .trend-column:nth-child(2) .trend-bar {
      background: var(--amber);
    }

    .trend-column:nth-child(3) .trend-bar {
      background: var(--violet);
    }

    .trend-value {
      color: var(--ink);
      font-weight: 700;
      font-size: 14px;
      text-align: center;
      word-break: keep-all;
    }

    .trend-label {
      color: var(--muted);
      font-size: 13px;
      text-align: center;
    }

    .workspace {
      display: grid;
      grid-template-columns: 290px minmax(0, 1fr);
      gap: 16px;
      align-items: start;
    }

    .side-panel,
    .table-area {
      padding: 18px;
    }

    .statement-list {
      display: grid;
      gap: 8px;
      margin-top: 14px;
    }

    .statement-tab {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      min-height: 42px;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #ffffff;
      color: var(--ink);
      cursor: pointer;
      text-align: left;
    }

    .statement-tab.active {
      border-color: var(--teal);
      background: var(--panel-soft);
      color: var(--teal);
      font-weight: 700;
    }

    .count {
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
    }

    .facts {
      display: grid;
      gap: 10px;
      margin-top: 18px;
      padding-top: 16px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 13px;
    }

    .fact-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
    }

    .fact-row strong {
      color: var(--ink);
      font-weight: 700;
      text-align: right;
    }

    .statement-chart {
      display: grid;
      gap: 9px;
      margin-bottom: 18px;
      padding: 14px 0 2px;
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
    }

    .bar-row {
      display: grid;
      grid-template-columns: minmax(130px, 220px) minmax(180px, 1fr) minmax(84px, 110px);
      align-items: center;
      gap: 12px;
      min-height: 28px;
      font-size: 13px;
    }

    .bar-label {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .bar-track {
      position: relative;
      height: 12px;
      border-radius: 999px;
      background: #ecefed;
      overflow: hidden;
    }

    .bar-track::after {
      content: "";
      position: absolute;
      top: 0;
      bottom: 0;
      left: 50%;
      width: 1px;
      background: rgba(32, 33, 36, 0.22);
    }

    .bar-fill {
      position: absolute;
      top: 0;
      bottom: 0;
      min-width: 2px;
    }

    .bar-fill.pos {
      left: 50%;
      background: var(--teal);
      border-radius: 0 999px 999px 0;
    }

    .bar-fill.neg {
      right: 50%;
      background: var(--red);
      border-radius: 999px 0 0 999px;
    }

    .bar-value {
      color: var(--muted);
      font-variant-numeric: tabular-nums;
      text-align: right;
    }

    .table-wrap {
      overflow: auto;
      max-height: 560px;
      border: 1px solid var(--line);
      border-radius: 8px;
    }

    table {
      width: 100%;
      min-width: 860px;
      border-collapse: collapse;
      font-size: 13px;
    }

    th,
    td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: middle;
    }

    th {
      position: sticky;
      top: 0;
      z-index: 1;
      background: #f7faf8;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    td.amount {
      font-variant-numeric: tabular-nums;
      text-align: right;
      white-space: nowrap;
    }

    td.account-id {
      color: var(--muted);
      font-size: 12px;
    }

    .empty {
      padding: 28px;
      color: var(--muted);
      text-align: center;
      border: 1px dashed var(--line);
      border-radius: 8px;
    }

    @media (max-width: 1180px) {
      .summary-grid {
        grid-template-columns: repeat(3, 1fr);
      }

      .workspace {
        grid-template-columns: 1fr;
      }

      .statement-list {
        grid-template-columns: repeat(5, 1fr);
      }
    }

    @media (max-width: 760px) {
      .topbar {
        display: block;
        padding: 22px 18px 16px;
      }

      h1 {
        font-size: 24px;
      }

      .actions {
        justify-content: flex-start;
        min-width: 0;
        margin-top: 16px;
        flex-wrap: wrap;
      }

      .status {
        width: 100%;
        text-align: left;
      }

      .shell {
        padding: 16px 14px 28px;
      }

      .summary-grid,
      .statement-list {
        grid-template-columns: 1fr;
      }

      .section-head {
        align-items: stretch;
        flex-direction: column;
      }

      select,
      .search {
        width: 100%;
      }

      .trend-chart {
        gap: 10px;
      }

      .bar-row {
        grid-template-columns: 1fr;
        gap: 5px;
        padding-bottom: 8px;
      }

      .bar-value {
        text-align: left;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div>
      <p class="eyebrow">OpenDART Financial Statements</p>
      <h1 id="dashboardTitle">재무제표 대시보드</h1>
    </div>
    <div class="actions">
      <select class="company-select" id="companySelect" aria-label="기업 선택"></select>
      <p class="status" id="status">데이터 로딩 중</p>
      <label class="file-button">
        파일 불러오기
        <input id="fileInput" type="file" accept=".json,.csv,application/json,text/csv">
      </label>
    </div>
  </header>

  <main class="shell">
    <section class="summary-grid" id="metrics"></section>

    <section class="chart-panel">
      <div class="section-head">
        <div>
          <h2>핵심 지표 추세</h2>
          <p id="trendMeta">최근 3개 기수 비교</p>
        </div>
        <select id="metricSelect" aria-label="핵심 지표 선택"></select>
      </div>
      <div class="trend-chart" id="trendChart"></div>
    </section>

    <section class="workspace">
      <aside class="side-panel">
        <h2>재무제표</h2>
        <div class="statement-list" id="statementTabs"></div>
        <div class="facts" id="facts"></div>
      </aside>

      <section class="table-area">
        <div class="section-head">
          <div>
            <h2 id="statementTitle">재무상태표</h2>
            <p id="statementMeta"></p>
          </div>
          <input class="search" id="searchInput" type="search" placeholder="계정명 또는 ID 검색" aria-label="계정 검색">
        </div>
        <div class="statement-chart" id="statementChart"></div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>계정명</th>
                <th>당기</th>
                <th>전기</th>
                <th>전전기</th>
                <th>전기 대비</th>
                <th>계정 ID</th>
              </tr>
            </thead>
            <tbody id="tableBody"></tbody>
          </table>
        </div>
      </section>
    </section>
  </main>

  <script>
    const DATA_DIRECTORY = "dart_output/";
    const DATA_SOURCES = [
      {
        company: "삼성전자",
        label: "삼성전자 · 2025 · 연간 · 연결",
        file: "dart_output/samsung_electronics_2025_annual_CFS.json"
      }
    ];

    const COMPANY_LABELS = {
      samsung_electronics: "삼성전자"
    };

    const REPORT_LABELS = {
      q1: "1분기",
      half: "반기",
      q3: "3분기",
      annual: "연간"
    };

    const FS_LABELS = {
      CFS: "연결",
      OFS: "별도"
    };

    const statementLabels = {
      BS: "재무상태표",
      IS: "손익계산서",
      CIS: "포괄손익계산서",
      CF: "현금흐름표",
      SCE: "자본변동표"
    };

    const metricDefs = [
      { id: "assets", label: "자산총계", accountIds: ["ifrs-full_Assets"], names: ["자산총계"], accent: "teal" },
      { id: "liabilities", label: "부채총계", accountIds: ["ifrs-full_Liabilities"], names: ["부채총계"], accent: "amber" },
      { id: "equity", label: "자본총계", accountIds: ["ifrs-full_Equity"], names: ["자본총계"], accent: "green" },
      { id: "revenue", label: "매출액", accountIds: ["ifrs-full_Revenue"], names: ["매출액"], accent: "violet" },
      { id: "operatingIncome", label: "영업이익", accountIds: ["dart_OperatingIncomeLoss"], names: ["영업이익"], accent: "teal" },
      { id: "profit", label: "당기순이익", accountIds: ["ifrs-full_ProfitLoss"], names: ["당기순이익"], accent: "green" }
    ];

    const state = {
      rows: [],
      dataSources: [],
      currentSource: null,
      selectedStatement: "BS",
      selectedMetric: "revenue",
      query: ""
    };

    const els = {
      dashboardTitle: document.getElementById("dashboardTitle"),
      companySelect: document.getElementById("companySelect"),
      status: document.getElementById("status"),
      fileInput: document.getElementById("fileInput"),
      metrics: document.getElementById("metrics"),
      metricSelect: document.getElementById("metricSelect"),
      trendMeta: document.getElementById("trendMeta"),
      trendChart: document.getElementById("trendChart"),
      statementTabs: document.getElementById("statementTabs"),
      facts: document.getElementById("facts"),
      statementTitle: document.getElementById("statementTitle"),
      statementMeta: document.getElementById("statementMeta"),
      statementChart: document.getElementById("statementChart"),
      searchInput: document.getElementById("searchInput"),
      tableBody: document.getElementById("tableBody")
    };

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function titleCase(value) {
      return value
        .split(/[_\s-]+/)
        .filter(Boolean)
        .map((part) => part.charAt(0).toUpperCase() + part.slice(1))
        .join(" ");
    }

    function inferDataSource(file) {
      const filename = file.split("/").pop() || file;
      const base = filename.replace(/\.(json|csv)$/i, "");
      const match = base.match(/^(.+?)_(\d{4})_([^_]+)_([A-Z]+)$/);

      if (!match) {
        return {
          company: titleCase(base),
          label: titleCase(base),
          file
        };
      }

      const [, companyKey, year, reportCode, fsDiv] = match;
      const company = COMPANY_LABELS[companyKey] || titleCase(companyKey);
      const report = REPORT_LABELS[reportCode] || reportCode;
      const fs = FS_LABELS[fsDiv] || fsDiv;
      return {
        company,
        year,
        report,
        fs,
        label: `${company} · ${year} · ${report} · ${fs}`,
        file
      };
    }

    function dataSourceKey(file) {
      return file.replace(/\.(json|csv)$/i, "");
    }

    function uniqueDataSources(sources) {
      const seen = new Set();
      return sources.filter((source) => {
        const key = dataSourceKey(source.file);
        if (seen.has(key)) return false;
        seen.add(key);
        return true;
      });
    }

    function parseAmount(value) {
      if (value === null || value === undefined || value === "") return null;
      const normalized = String(value).replace(/,/g, "").trim();
      if (!normalized) return null;
      const number = Number(normalized);
      return Number.isFinite(number) ? number : null;
    }

    function formatAmount(value) {
      if (value === null || value === undefined || !Number.isFinite(value)) return "-";
      const abs = Math.abs(value);
      const sign = value < 0 ? "-" : "";
      const amount = Math.abs(value);
      if (abs >= 1_0000_0000_0000) {
        return `${sign}${(amount / 1_0000_0000_0000).toLocaleString("ko-KR", { maximumFractionDigits: 1 })}조`;
      }
      if (abs >= 1_0000_0000) {
        return `${sign}${(amount / 1_0000_0000).toLocaleString("ko-KR", { maximumFractionDigits: 1 })}억`;
      }
      return value.toLocaleString("ko-KR");
    }

    function formatPercent(value) {
      if (value === null || value === undefined || !Number.isFinite(value)) return "-";
      const sign = value > 0 ? "+" : "";
      return `${sign}${value.toLocaleString("ko-KR", { maximumFractionDigits: 1 })}%`;
    }

    function changeRate(current, previous) {
      if (!Number.isFinite(current) || !Number.isFinite(previous) || previous === 0) return null;
      return ((current - previous) / Math.abs(previous)) * 100;
    }

    function normalizeRows(rows) {
      return rows
        .filter((row) => row && row.account_nm)
        .map((row) => ({
          ...row,
          ord: Number(row.ord) || 0,
          sj_div: String(row.sj_div || "").trim(),
          sj_nm: String(row.sj_nm || statementLabels[row.sj_div] || "").trim(),
          account_id: String(row.account_id || "").trim(),
          account_nm: String(row.account_nm || "").trim(),
          currency: String(row.currency || "KRW").trim()
        }))
        .sort((a, b) => a.sj_div.localeCompare(b.sj_div) || a.ord - b.ord);
    }

    function parseCsv(text) {
      const rows = [];
      let field = "";
      let row = [];
      let inQuotes = false;
      const source = text.replace(/^\uFEFF/, "");

      for (let i = 0; i < source.length; i += 1) {
        const char = source[i];
        const next = source[i + 1];

        if (char === '"' && inQuotes && next === '"') {
          field += '"';
          i += 1;
        } else if (char === '"') {
          inQuotes = !inQuotes;
        } else if (char === "," && !inQuotes) {
          row.push(field);
          field = "";
        } else if ((char === "\n" || char === "\r") && !inQuotes) {
          if (char === "\r" && next === "\n") i += 1;
          row.push(field);
          if (row.some((cell) => cell !== "")) rows.push(row);
          row = [];
          field = "";
        } else {
          field += char;
        }
      }

      if (field || row.length) {
        row.push(field);
        rows.push(row);
      }

      const headers = rows.shift() || [];
      return rows.map((cells) => Object.fromEntries(headers.map((header, index) => [header, cells[index] || ""])));
    }

    function findMetric(def) {
      return state.rows.find((row) => def.accountIds.includes(row.account_id))
        || state.rows.find((row) => def.names.includes(row.account_nm));
    }

    function getPeriods(row) {
      return [
        { label: row.bfefrmtrm_nm || "전전기", value: parseAmount(row.bfefrmtrm_amount) },
        { label: row.frmtrm_nm || "전기", value: parseAmount(row.frmtrm_amount) },
        { label: row.thstrm_nm || "당기", value: parseAmount(row.thstrm_amount) }
      ];
    }

    function setStatus(message) {
      els.status.textContent = message;
    }

    function renderHeader() {
      const company = state.currentSource && state.currentSource.company
        ? state.currentSource.company
        : "기업";
      const title = `${company} 재무제표 대시보드`;
      els.dashboardTitle.textContent = title;
      document.title = title;
    }

    function renderCompanySelect() {
      if (!state.dataSources.length) {
        els.companySelect.innerHTML = `<option value="">데이터 없음</option>`;
        els.companySelect.disabled = true;
        return;
      }

      els.companySelect.disabled = false;
      els.companySelect.innerHTML = state.dataSources.map((source, index) => {
        const selected = state.currentSource && source.file === state.currentSource.file
          ? " selected"
          : "";
        return `<option value="${index}"${selected}>${escapeHtml(source.label)}</option>`;
      }).join("");
    }

    async function discoverDataSources() {
      const configured = DATA_SOURCES.map((source) => ({
        ...inferDataSource(source.file),
        ...source
      }));
      const discovered = [];

      try {
        const response = await fetch(DATA_DIRECTORY, { cache: "no-store" });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const html = await response.text();
        const documentFragment = new DOMParser().parseFromString(html, "text/html");
        const links = Array.from(documentFragment.querySelectorAll("a"));

        for (const link of links) {
          const href = decodeURIComponent(link.getAttribute("href") || "");
          const filename = href.split("/").pop();
          if (!filename || !/\.(json|csv)$/i.test(filename)) continue;
          discovered.push(inferDataSource(`${DATA_DIRECTORY}${filename}`));
        }
      } catch (error) {
        // Some static hosts disable directory listings. The configured list remains usable.
      }

      discovered.sort((a, b) => {
        const aJson = a.file.toLowerCase().endsWith(".json") ? 0 : 1;
        const bJson = b.file.toLowerCase().endsWith(".json") ? 0 : 1;
        return aJson - bJson;
      });

      return uniqueDataSources([...configured, ...discovered])
        .sort((a, b) => a.company.localeCompare(b.company, "ko-KR") || String(b.year || "").localeCompare(String(a.year || "")));
    }

    function renderMetricOptions() {
      els.metricSelect.innerHTML = metricDefs
        .map((metric) => `<option value="${metric.id}">${metric.label}</option>`)
        .join("");
      els.metricSelect.value = state.selectedMetric;
    }

    function renderMetrics() {
      els.metrics.innerHTML = metricDefs.map((metric) => {
        const row = findMetric(metric);
        const current = row ? parseAmount(row.thstrm_amount) : null;
        const previous = row ? parseAmount(row.frmtrm_amount) : null;
        const rate = changeRate(current, previous);
        const direction = rate === null ? "" : rate >= 0 ? "up" : "down";
        return `
          <article class="metric-card">
            <h3>${metric.label}</h3>
            <div class="metric-value">${formatAmount(current)}</div>
            <div class="metric-change ${direction}">전기 대비 ${formatPercent(rate)}</div>
          </article>
        `;
      }).join("");
    }

    function renderTrendChart() {
      const metric = metricDefs.find((item) => item.id === state.selectedMetric) || metricDefs[0];
      const row = findMetric(metric);
      if (!row) {
        els.trendChart.innerHTML = `<div class="empty">선택한 지표 데이터가 없습니다.</div>`;
        return;
      }

      const periods = getPeriods(row);
      const max = Math.max(...periods.map((period) => Math.abs(period.value || 0)), 1);
      els.trendMeta.textContent = `${metric.label} · ${row.currency || "KRW"}`;
      els.trendChart.innerHTML = periods.map((period) => {
        const height = Math.max(3, Math.round((Math.abs(period.value || 0) / max) * 100));
        return `
          <div class="trend-column">
            <div class="trend-bar-wrap">
              <div class="trend-bar" style="height:${height}%"></div>
            </div>
            <div class="trend-value">${formatAmount(period.value)}</div>
            <div class="trend-label">${period.label}</div>
          </div>
        `;
      }).join("");
    }

    function statementCounts() {
      return state.rows.reduce((acc, row) => {
        acc[row.sj_div] = (acc[row.sj_div] || 0) + 1;
        return acc;
      }, {});
    }

    function renderTabs() {
      const counts = statementCounts();
      const available = Object.keys(statementLabels).filter((key) => counts[key]);
      if (!available.includes(state.selectedStatement)) {
        state.selectedStatement = available[0] || "BS";
      }

      els.statementTabs.innerHTML = available.map((key) => `
        <button class="statement-tab ${key === state.selectedStatement ? "active" : ""}" data-statement="${key}">
          <span>${statementLabels[key]}</span>
          <span class="count">${counts[key]}</span>
        </button>
      `).join("");
    }

    function filteredRows() {
      const query = state.query.trim().toLowerCase();
      return state.rows
        .filter((row) => row.sj_div === state.selectedStatement)
        .filter((row) => {
          if (!query) return true;
          return `${row.account_nm} ${row.account_id}`.toLowerCase().includes(query);
        })
        .sort((a, b) => a.ord - b.ord);
    }

    function renderFacts() {
      const first = state.rows[0] || {};
      const counts = statementCounts();
      const total = state.rows.length;
      const source = state.currentSource || {};
      els.facts.innerHTML = `
        <div class="fact-row"><span>기업</span><strong>${source.company || "-"}</strong></div>
        <div class="fact-row"><span>사업연도</span><strong>${first.bsns_year || "-"}</strong></div>
        <div class="fact-row"><span>보고서</span><strong>${first.reprt_code || "-"}</strong></div>
        <div class="fact-row"><span>접수번호</span><strong>${first.rcept_no || "-"}</strong></div>
        <div class="fact-row"><span>통화</span><strong>${first.currency || "KRW"}</strong></div>
        <div class="fact-row"><span>전체 항목</span><strong>${total.toLocaleString("ko-KR")}</strong></div>
        <div class="fact-row"><span>선택 항목</span><strong>${(counts[state.selectedStatement] || 0).toLocaleString("ko-KR")}</strong></div>
      `;
    }

    function renderStatementChart(rows) {
      const candidates = rows
        .map((row) => ({ row, amount: parseAmount(row.thstrm_amount) }))
        .filter((item) => Number.isFinite(item.amount) && Math.abs(item.amount) >= 1_0000_0000)
        .filter((item) => !item.row.account_nm.includes("주당"))
        .sort((a, b) => Math.abs(b.amount) - Math.abs(a.amount))
        .slice(0, 10);

      if (!candidates.length) {
        els.statementChart.innerHTML = `<div class="empty">표시할 금액 데이터가 없습니다.</div>`;
        return;
      }

      const max = Math.max(...candidates.map((item) => Math.abs(item.amount)), 1);
      els.statementChart.innerHTML = candidates.map(({ row, amount }) => {
        const width = Math.max(2, Math.round((Math.abs(amount) / max) * 50));
        const direction = amount >= 0 ? "pos" : "neg";
        return `
          <div class="bar-row">
            <div class="bar-label" title="${row.account_nm}">${row.account_nm}</div>
            <div class="bar-track">
              <div class="bar-fill ${direction}" style="width:${width}%"></div>
            </div>
            <div class="bar-value">${formatAmount(amount)}</div>
          </div>
        `;
      }).join("");
    }

    function renderTable(rows) {
      if (!rows.length) {
        els.tableBody.innerHTML = `<tr><td colspan="6"><div class="empty">일치하는 계정이 없습니다.</div></td></tr>`;
        return;
      }

      els.tableBody.innerHTML = rows.map((row) => {
        const current = parseAmount(row.thstrm_amount);
        const previous = parseAmount(row.frmtrm_amount);
        const beforePrevious = parseAmount(row.bfefrmtrm_amount);
        return `
          <tr>
            <td>${row.account_nm}</td>
            <td class="amount">${formatAmount(current)}</td>
            <td class="amount">${formatAmount(previous)}</td>
            <td class="amount">${formatAmount(beforePrevious)}</td>
            <td class="amount">${formatPercent(changeRate(current, previous))}</td>
            <td class="account-id">${row.account_id}</td>
          </tr>
        `;
      }).join("");
    }

    function renderStatement() {
      const rows = filteredRows();
      const sourceRows = state.rows.filter((row) => row.sj_div === state.selectedStatement);
      const title = statementLabels[state.selectedStatement] || state.selectedStatement;
      els.statementTitle.textContent = title;
      els.statementMeta.textContent = `${sourceRows.length.toLocaleString("ko-KR")}개 항목 · ${rows.length.toLocaleString("ko-KR")}개 표시`;
      renderFacts();
      renderStatementChart(sourceRows);
      renderTable(rows);
    }

    function renderAll() {
      if (!state.rows.length) {
        els.metrics.innerHTML = "";
        els.trendChart.innerHTML = `<div class="empty">데이터가 없습니다.</div>`;
        els.statementTabs.innerHTML = "";
        els.statementChart.innerHTML = "";
        els.tableBody.innerHTML = "";
        return;
      }

      renderMetricOptions();
      renderMetrics();
      renderTrendChart();
      renderTabs();
      renderStatement();
    }

    function loadRows(rows, source) {
      state.currentSource = source;
      state.rows = normalizeRows(rows);
      state.query = "";
      els.searchInput.value = "";
      renderHeader();
      renderCompanySelect();
      setStatus(`${source.label} · ${state.rows.length.toLocaleString("ko-KR")}개 항목`);
      renderAll();
    }

    async function loadDataSource(source) {
      try {
        setStatus(`${source.label} 로딩 중`);
        if (source.rows) {
          loadRows(source.rows, source);
          return;
        }
        const response = await fetch(source.file, { cache: "no-store" });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const text = await response.text();
        const rows = source.file.toLowerCase().endsWith(".csv") ? parseCsv(text) : JSON.parse(text);
        loadRows(rows, source);
      } catch (error) {
        setStatus(`${source.label} 파일을 읽지 못했습니다: ${error.message}`);
      }
    }

    async function initializeDataSources() {
      state.dataSources = await discoverDataSources();
      renderCompanySelect();

      if (!state.dataSources.length) {
        setStatus("데이터 파일이 없습니다. JSON 또는 CSV 파일을 선택하세요.");
        renderHeader();
        renderAll();
        return;
      }

      await loadDataSource(state.dataSources[0]);
    }

    async function loadSelectedFile(file) {
      const text = await file.text();
      const rows = file.name.toLowerCase().endsWith(".csv") ? parseCsv(text) : JSON.parse(text);
      const inferred = inferDataSource(file.name);
      const source = {
        ...inferred,
        company: inferred.company || "사용자 파일",
        label: `${inferred.label} · 사용자 파일`,
        file: file.name,
        rows
      };
      state.dataSources = uniqueDataSources([source, ...state.dataSources]);
      loadRows(rows, source);
    }

    els.metricSelect.addEventListener("change", (event) => {
      state.selectedMetric = event.target.value;
      renderTrendChart();
    });

    els.statementTabs.addEventListener("click", (event) => {
      const button = event.target.closest("[data-statement]");
      if (!button) return;
      state.selectedStatement = button.dataset.statement;
      renderTabs();
      renderStatement();
    });

    els.searchInput.addEventListener("input", (event) => {
      state.query = event.target.value;
      renderStatement();
    });

    els.companySelect.addEventListener("change", async (event) => {
      const source = state.dataSources[Number(event.target.value)];
      if (!source) return;
      await loadDataSource(source);
    });

    els.fileInput.addEventListener("change", async (event) => {
      const file = event.target.files && event.target.files[0];
      if (!file) return;
      try {
        await loadSelectedFile(file);
      } catch (error) {
        setStatus(`파일을 읽지 못했습니다: ${error.message}`);
      }
    });

    initializeDataSources();
  </script>
</body>
</html>
