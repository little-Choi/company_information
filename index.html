<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>삼성전자 재무제표 대시보드</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f4;
      --panel: #ffffff;
      --panel-soft: #f0f5f3;
      --ink: #202124;
      --muted: #687076;
      --line: #d9dfdc;
      --teal: #007d7a;
      --green: #3c7a3e;
      --amber: #a96700;
      --red: #b4473f;
      --violet: #6657b8;
      --shadow: 0 10px 24px rgba(30, 36, 34, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: "Segoe UI", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      line-height: 1.45;
    }

    button,
    input,
    select {
      font: inherit;
    }

    .topbar {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 24px;
      padding: 28px 32px 20px;
      border-bottom: 1px solid var(--line);
      background: #fbfcfa;
    }

    .eyebrow {
      margin: 0 0 6px;
      color: var(--teal);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    h1,
    h2,
    h3,
    p {
      margin: 0;
    }

    h1 {
      font-size: 30px;
      line-height: 1.1;
    }

    h2 {
      font-size: 17px;
      line-height: 1.2;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 320px;
      justify-content: flex-end;
    }

    .status {
      max-width: 360px;
      color: var(--muted);
      font-size: 13px;
      text-align: right;
    }

    .company-select {
      min-width: 260px;
      max-width: 360px;
    }

    .file-button {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 38px;
      padding: 0 14px;
      border: 1px solid var(--teal);
      border-radius: 6px;
      color: #ffffff;
      background: var(--teal);
      cursor: pointer;
      white-space: nowrap;
    }

    .file-button input {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }

    .shell {
      width: min(1440px, 100%);
      margin: 0 auto;
      padding: 24px 32px 36px;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(6, minmax(140px, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }

    .metric-card,
    .chart-panel,
    .side-panel,
    .table-area {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .metric-card {
      min-height: 120px;
      padding: 16px;
    }

    .metric-card h3 {
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
    }

    .metric-value {
      margin-top: 14px;
      font-size: 24px;
      font-weight: 800;
      line-height: 1.05;
      word-break: keep-all;
    }

    .metric-change {
      margin-top: 12px;
      font-size: 13px;
      color: var(--muted);
    }

    .metric-change.up {
      color: var(--green);
    }

    .metric-change.down {
      color: var(--red);
    }

    .chart-panel {
      padding: 18px;
      margin-bottom: 16px;
    }

    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 14px;
    }

    .section-head p {
      margin-top: 5px;
      color: var(--muted);
      font-size: 13px;
    }

    select,
    .search {
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #ffffff;
      color: var(--ink);
      padding: 0 12px;
      outline: none;
    }

    select:focus,
    .search:focus {
      border-color: var(--teal);
      box-shadow: 0 0 0 3px rgba(0, 125, 122, 0.14);
    }

    .trend-chart {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(72px, 1fr));
      align-items: end;
      gap: 18px;
      min-height: 230px;
      padding: 10px 4px 0;
    }

    .trend-column {
      display: grid;
      grid-template-rows: 1fr auto auto;
      min-height: 210px;
      gap: 8px;
    }

    .trend-bar-wrap {
      position: relative;
      display: flex;
      align-items: flex-end;
      min-height: 160px;
      border-bottom: 1px solid var(--line);
    }

    .trend-bar {
      width: 100%;
      min-height: 4px;
      border-radius: 6px 6px 0 0;
      background: var(--teal);
    }

    .trend-column:nth-child(2) .trend-bar {
      background: var(--amber);
    }

    .trend-column:nth-child(3) .trend-bar {
      background: var(--violet);
    }

    .trend-value {
      color: var(--ink);
      font-weight: 700;
      font-size: 14px;
      text-align: center;
      word-break: keep-all;
    }

    .trend-label {
      color: var(--muted);
      font-size: 13px;
      text-align: center;
    }

    .workspace {
      display: grid;
      grid-template-columns: 290px minmax(0, 1fr);
      gap: 16px;
      align-items: start;
    }

    .side-panel,
    .table-area {
      padding: 18px;
    }

    .statement-list {
      display: grid;
      gap: 8px;
      margin-top: 14px;
    }

    .statement-tab {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      min-height: 42px;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #ffffff;
      color: var(--ink);
      cursor: pointer;
      text-align: left;
    }

    .statement-tab.active {
      border-color: var(--teal);
      background: var(--panel-soft);
      color: var(--teal);
      font-weight: 700;
    }

    .count {
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
    }

    .facts {
      display: grid;
      gap: 10px;
      margin-top: 18px;
      padding-top: 16px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 13px;
    }

    .fact-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
    }

    .fact-row strong {
      color: var(--ink);
      font-weight: 700;
      text-align: right;
    }

    .statement-chart {
      display: grid;
      gap: 9px;
      margin-bottom: 18px;
      padding: 14px 0 2px;
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
    }

    .statement-chart.compare-chart {
      gap: 14px;
      margin-bottom: 0;
      padding: 16px 0 0;
      border-bottom: 0;
    }

    .compare-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: var(--teal);
    }

    .legend-dot.previous {
      background: var(--amber);
    }

    .compare-grid {
      display: grid;
      gap: 10px;
      max-height: 760px;
      overflow: auto;
      padding-right: 4px;
    }

    .compare-row {
      display: grid;
      grid-template-columns: minmax(150px, 240px) minmax(260px, 1fr) minmax(74px, 98px);
      align-items: center;
      gap: 14px;
      min-height: 70px;
      padding: 10px 0;
      border-bottom: 1px solid var(--line);
    }

    .compare-row:last-child {
      border-bottom: 0;
    }

    .compare-label {
      min-width: 0;
    }

    .compare-name {
      display: block;
      overflow: hidden;
      color: var(--ink);
      font-size: 14px;
      font-weight: 800;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .compare-id {
      display: block;
      overflow: hidden;
      margin-top: 4px;
      color: var(--muted);
      font-size: 11px;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .compare-detail {
      display: block;
      overflow: hidden;
      margin-top: 3px;
      color: var(--muted);
      font-size: 11px;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .compare-bars {
      display: grid;
      gap: 7px;
      min-width: 0;
    }

    .compare-bar-line {
      display: grid;
      grid-template-columns: 46px minmax(110px, 1fr) minmax(84px, 116px);
      align-items: center;
      gap: 8px;
      font-size: 12px;
    }

    .compare-year {
      color: var(--muted);
      font-weight: 700;
    }

    .compare-track {
      height: 12px;
      overflow: hidden;
      border-radius: 999px;
      background: #ecefed;
    }

    .compare-fill {
      height: 100%;
      border-radius: 999px;
    }

    .compare-fill.latest {
      background: var(--teal);
    }

    .compare-fill.previous {
      background: var(--amber);
    }

    .compare-amount {
      color: var(--ink);
      font-variant-numeric: tabular-nums;
      text-align: right;
      white-space: nowrap;
    }

    .compare-bar-line.previous .compare-amount {
      color: var(--muted);
    }

    .compare-change {
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
      text-align: right;
      white-space: nowrap;
    }

    .compare-change.up {
      color: var(--green);
    }

    .compare-change.down {
      color: var(--red);
    }

    .table-controls {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      min-width: min(100%, 460px);
    }

    .table-controls .search {
      flex: 1;
      min-width: 220px;
    }

    .empty {
      padding: 28px;
      color: var(--muted);
      text-align: center;
      border: 1px dashed var(--line);
      border-radius: 8px;
    }

    @media (max-width: 1180px) {
      .summary-grid {
        grid-template-columns: repeat(3, 1fr);
      }

      .workspace {
        grid-template-columns: 1fr;
      }

      .statement-list {
        grid-template-columns: repeat(5, 1fr);
      }
    }

    @media (max-width: 760px) {
      .topbar {
        display: block;
        padding: 22px 18px 16px;
      }

      h1 {
        font-size: 24px;
      }

      .actions {
        justify-content: flex-start;
        min-width: 0;
        margin-top: 16px;
        flex-wrap: wrap;
      }

      .status {
        width: 100%;
        text-align: left;
      }

      .shell {
        padding: 16px 14px 28px;
      }

      .summary-grid,
      .statement-list {
        grid-template-columns: 1fr;
      }

      .section-head {
        align-items: stretch;
        flex-direction: column;
      }

      select,
      .search {
        width: 100%;
      }

      .table-controls {
        width: 100%;
        min-width: 0;
        flex-direction: column;
      }

      .table-controls .search {
        min-width: 0;
      }

      .trend-chart {
        gap: 10px;
      }

      .compare-row {
        grid-template-columns: 1fr;
        gap: 8px;
      }

      .compare-bar-line {
        grid-template-columns: 42px minmax(80px, 1fr) 88px;
      }

      .compare-change {
        text-align: left;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div>
      <p class="eyebrow">OpenDART Financial Statements</p>
      <h1 id="dashboardTitle">재무제표 대시보드</h1>
    </div>
    <div class="actions">
      <select class="company-select" id="companySelect" aria-label="기업 선택"></select>
      <p class="status" id="status">데이터 로딩 중</p>
      <label class="file-button">
        파일 불러오기
        <input id="fileInput" type="file" accept=".json,.csv,application/json,text/csv">
      </label>
    </div>
  </header>

  <main class="shell">
    <section class="summary-grid" id="metrics"></section>

    <section class="chart-panel">
      <div class="section-head">
        <div>
          <h2>핵심 지표 추세</h2>
          <p id="trendMeta">최근 3개 기수 비교</p>
        </div>
        <select id="metricSelect" aria-label="핵심 지표 선택"></select>
      </div>
      <div class="trend-chart" id="trendChart"></div>
    </section>

    <section class="workspace">
      <aside class="side-panel">
        <h2>재무제표</h2>
        <div class="statement-list" id="statementTabs"></div>
        <div class="facts" id="facts"></div>
      </aside>

      <section class="table-area">
        <div class="section-head">
          <div>
            <h2 id="statementTitle">재무상태표</h2>
            <p id="statementMeta"></p>
          </div>
          <div class="table-controls">
            <input class="search" id="searchInput" type="search" placeholder="계정명 또는 ID 검색" aria-label="계정 검색">
          </div>
        </div>
        <div class="statement-chart" id="statementChart"></div>
      </section>
    </section>
  </main>

  <script>
    const DATA_DIRECTORY = "dart_output/";
    const DATA_MANIFEST = "dart_output/company_financials_manifest.json";
    const DATA_SOURCES = [
      {
        company: "삼성전자",
        label: "삼성전자 · 전체 연도 · 연간 · 연결",
        year: "all_years",
        allYears: true,
        file: "dart_output/samsung_electronics_all_years_annual_CFS.json"
      }
    ];

    const COMPANY_LABELS = {
      samsung_electronics: "삼성전자"
    };

    const REPORT_LABELS = {
      q1: "1분기",
      half: "반기",
      q3: "3분기",
      annual: "연간"
    };

    const FS_LABELS = {
      CFS: "연결",
      OFS: "별도"
    };

    const statementLabels = {
      BS: "재무상태표",
      IS: "손익계산서",
      CIS: "포괄손익계산서",
      CF: "현금흐름표",
      SCE: "자본변동표"
    };

    const metricDefs = [
      { id: "assets", label: "자산총계", accountIds: ["ifrs-full_Assets", "ifrs_Assets"], names: ["자산총계"], accent: "teal" },
      { id: "liabilities", label: "부채총계", accountIds: ["ifrs-full_Liabilities", "ifrs_Liabilities"], names: ["부채총계"], accent: "amber" },
      { id: "equity", label: "자본총계", accountIds: ["ifrs-full_Equity", "ifrs_Equity"], names: ["자본총계"], accent: "green" },
      { id: "revenue", label: "매출액", accountIds: ["ifrs-full_Revenue", "ifrs_Revenue"], names: ["매출액", "수익(매출액)", "영업수익"], accent: "violet" },
      { id: "operatingIncome", label: "영업이익", accountIds: ["dart_OperatingIncomeLoss"], names: ["영업이익", "영업이익(손실)"], accent: "teal" },
      { id: "profit", label: "당기순이익", accountIds: ["ifrs-full_ProfitLoss", "ifrs_ProfitLoss"], names: ["당기순이익", "당기순이익(손실)"], accent: "green" }
    ];

    const state = {
      rows: [],
      dataSources: [],
      currentSource: null,
      selectedStatement: "BS",
      selectedMetric: "revenue",
      query: ""
    };

    const els = {
      dashboardTitle: document.getElementById("dashboardTitle"),
      companySelect: document.getElementById("companySelect"),
      status: document.getElementById("status"),
      fileInput: document.getElementById("fileInput"),
      metrics: document.getElementById("metrics"),
      metricSelect: document.getElementById("metricSelect"),
      trendMeta: document.getElementById("trendMeta"),
      trendChart: document.getElementById("trendChart"),
      statementTabs: document.getElementById("statementTabs"),
      facts: document.getElementById("facts"),
      statementTitle: document.getElementById("statementTitle"),
      statementMeta: document.getElementById("statementMeta"),
      statementChart: document.getElementById("statementChart"),
      searchInput: document.getElementById("searchInput")
    };

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function titleCase(value) {
      return value
        .split(/[_\s-]+/)
        .filter(Boolean)
        .map((part) => part.charAt(0).toUpperCase() + part.slice(1))
        .join(" ");
    }

    function inferDataSource(file) {
      const filename = file.split("/").pop() || file;
      const base = filename.replace(/\.(json|csv)$/i, "");
      const match = base.match(/^(.+?)_((?:\d{4})|all_years)_([^_]+)_([A-Z]+)$/);

      if (!match) {
        return {
          company: titleCase(base),
          label: titleCase(base),
          file
        };
      }

      const [, companyKey, year, reportCode, fsDiv] = match;
      const company = COMPANY_LABELS[companyKey] || titleCase(companyKey);
      const report = REPORT_LABELS[reportCode] || reportCode;
      const fs = FS_LABELS[fsDiv] || fsDiv;
      const allYears = year === "all_years";
      const yearLabel = allYears ? "전체 연도" : year;
      return {
        company,
        year,
        allYears,
        report,
        fs,
        label: `${company} · ${yearLabel} · ${report} · ${fs}`,
        file
      };
    }

    function dataSourceKey(file) {
      return file.replace(/\.(json|csv)$/i, "");
    }

    function uniqueDataSources(sources) {
      const seen = new Set();
      return sources.filter((source) => {
        const key = dataSourceKey(source.file);
        if (seen.has(key)) return false;
        seen.add(key);
        return true;
      });
    }

    function parseAmount(value) {
      if (value === null || value === undefined || value === "") return null;
      const normalized = String(value).replace(/,/g, "").trim();
      if (!normalized) return null;
      const number = Number(normalized);
      return Number.isFinite(number) ? number : null;
    }

    function formatAmount(value) {
      if (value === null || value === undefined || !Number.isFinite(value)) return "-";
      const abs = Math.abs(value);
      const sign = value < 0 ? "-" : "";
      const amount = Math.abs(value);
      if (abs >= 1_0000_0000_0000) {
        return `${sign}${(amount / 1_0000_0000_0000).toLocaleString("ko-KR", { maximumFractionDigits: 1 })}조`;
      }
      if (abs >= 1_0000_0000) {
        return `${sign}${(amount / 1_0000_0000).toLocaleString("ko-KR", { maximumFractionDigits: 1 })}억`;
      }
      return value.toLocaleString("ko-KR");
    }

    function formatPercent(value) {
      if (value === null || value === undefined || !Number.isFinite(value)) return "-";
      const sign = value > 0 ? "+" : "";
      return `${sign}${value.toLocaleString("ko-KR", { maximumFractionDigits: 1 })}%`;
    }

    function changeRate(current, previous) {
      if (!Number.isFinite(current) || !Number.isFinite(previous) || previous === 0) return null;
      return ((current - previous) / Math.abs(previous)) * 100;
    }

    function rowYear(row) {
      const year = Number(row.bsns_year);
      return Number.isFinite(year) ? year : null;
    }

    function availableYearsForStatement(statement) {
      return Array.from(new Set(
        state.rows
          .filter((row) => row.sj_div === statement)
          .map(rowYear)
          .filter(Boolean)
      )).sort((a, b) => b - a);
    }

    function recentYearsForStatement(statement) {
      return availableYearsForStatement(statement).slice(0, 2);
    }

    function activeStatementYears() {
      return recentYearsForStatement(state.selectedStatement);
    }

    function rowsForActiveStatement(rows = state.rows) {
      const years = new Set(activeStatementYears());
      return rows.filter((row) => (
        row.sj_div === state.selectedStatement
        && years.has(rowYear(row))
      ));
    }

    function metricMatches(row, def) {
      return def.accountIds.includes(row.account_id) || def.names.includes(row.account_nm);
    }

    function metricRank(row, def) {
      if (def.accountIds.includes(row.account_id)) return 0;
      if (def.names.includes(row.account_nm)) return 1;
      return 2;
    }

    function getMetricPoints(def) {
      const byYear = new Map();

      for (const row of state.rows.filter((item) => metricMatches(item, def))) {
        const year = rowYear(row);
        if (!year) continue;
        const current = byYear.get(year);
        if (
          !current
          || metricRank(row, def) < metricRank(current, def)
          || (metricRank(row, def) === metricRank(current, def) && row.ord < current.ord)
        ) {
          byYear.set(year, row);
        }
      }

      return Array.from(byYear.entries())
        .sort(([a], [b]) => a - b)
        .map(([year, row]) => ({
          label: String(year),
          value: parseAmount(row.thstrm_amount),
          row
        }))
        .filter((point) => Number.isFinite(point.value));
    }

    function getMetricValues(def) {
      const points = getMetricPoints(def);
      if (points.length >= 2) {
        const current = points[points.length - 1];
        const previous = points[points.length - 2];
        return {
          current: current.value,
          previous: previous.value,
          currentLabel: current.label,
          previousLabel: previous.label,
          row: current.row
        };
      }

      const row = state.rows.find((item) => metricMatches(item, def));
      return {
        current: row ? parseAmount(row.thstrm_amount) : null,
        previous: row ? parseAmount(row.frmtrm_amount) : null,
        currentLabel: row ? String(row.bsns_year || "당기") : "당기",
        previousLabel: row ? "전기" : "전기",
        row
      };
    }

    function normalizeRows(rows) {
      return rows
        .filter((row) => row && row.account_nm)
        .map((row) => ({
          ...row,
          ord: Number(row.ord) || 0,
          sj_div: String(row.sj_div || "").trim(),
          sj_nm: String(row.sj_nm || statementLabels[row.sj_div] || "").trim(),
          account_id: String(row.account_id || "").trim(),
          account_nm: String(row.account_nm || "").trim(),
          currency: String(row.currency || "KRW").trim()
        }))
        .sort((a, b) => {
          const yearDiff = (rowYear(b) || 0) - (rowYear(a) || 0);
          return yearDiff || a.sj_div.localeCompare(b.sj_div) || a.ord - b.ord;
        });
    }

    function parseCsv(text) {
      const rows = [];
      let field = "";
      let row = [];
      let inQuotes = false;
      const source = text.replace(/^\uFEFF/, "");

      for (let i = 0; i < source.length; i += 1) {
        const char = source[i];
        const next = source[i + 1];

        if (char === '"' && inQuotes && next === '"') {
          field += '"';
          i += 1;
        } else if (char === '"') {
          inQuotes = !inQuotes;
        } else if (char === "," && !inQuotes) {
          row.push(field);
          field = "";
        } else if ((char === "\n" || char === "\r") && !inQuotes) {
          if (char === "\r" && next === "\n") i += 1;
          row.push(field);
          if (row.some((cell) => cell !== "")) rows.push(row);
          row = [];
          field = "";
        } else {
          field += char;
        }
      }

      if (field || row.length) {
        row.push(field);
        rows.push(row);
      }

      const headers = rows.shift() || [];
      return rows.map((cells) => Object.fromEntries(headers.map((header, index) => [header, cells[index] || ""])));
    }

    function findMetric(def) {
      return getMetricValues(def).row;
    }

    function getPeriods(row) {
      return [
        { label: row.bfefrmtrm_nm || "전전기", value: parseAmount(row.bfefrmtrm_amount) },
        { label: row.frmtrm_nm || "전기", value: parseAmount(row.frmtrm_amount) },
        { label: row.thstrm_nm || "당기", value: parseAmount(row.thstrm_amount) }
      ];
    }

    function setStatus(message) {
      els.status.textContent = message;
    }

    function renderHeader() {
      const company = state.currentSource && state.currentSource.company
        ? state.currentSource.company
        : "기업";
      const title = `${company} 재무제표 대시보드`;
      els.dashboardTitle.textContent = title;
      document.title = title;
    }

    function renderCompanySelect() {
      if (!state.dataSources.length) {
        els.companySelect.innerHTML = `<option value="">데이터 없음</option>`;
        els.companySelect.disabled = true;
        return;
      }

      els.companySelect.disabled = false;
      els.companySelect.innerHTML = state.dataSources.map((source, index) => {
        const selected = state.currentSource && source.file === state.currentSource.file
          ? " selected"
          : "";
        return `<option value="${index}"${selected}>${escapeHtml(source.label)}</option>`;
      }).join("");
    }

    async function discoverDataSources() {
      const configured = DATA_SOURCES.map((source) => ({
        ...inferDataSource(source.file),
        ...source
      }));
      const manifestSources = [];
      const discovered = [];

      try {
        const response = await fetch(DATA_MANIFEST, { cache: "no-store" });
        if (response.ok) {
          const payload = await response.json();
          const sources = Array.isArray(payload) ? payload : payload.sources;
          if (Array.isArray(sources)) {
            manifestSources.push(...sources.filter((source) => source && source.file));
          }
        }
      } catch (error) {
        // The manifest is created by the all-company fetch script. It is optional.
      }

      try {
        const response = await fetch(DATA_DIRECTORY, { cache: "no-store" });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const html = await response.text();
        const documentFragment = new DOMParser().parseFromString(html, "text/html");
        const links = Array.from(documentFragment.querySelectorAll("a"));

        for (const link of links) {
          const href = decodeURIComponent(link.getAttribute("href") || "");
          const filename = href.split("/").pop();
          if (!filename || !/\.(json|csv)$/i.test(filename)) continue;
          discovered.push(inferDataSource(`${DATA_DIRECTORY}${filename}`));
        }
      } catch (error) {
        // Some static hosts disable directory listings. The configured list remains usable.
      }

      discovered.sort((a, b) => {
        const aJson = a.file.toLowerCase().endsWith(".json") ? 0 : 1;
        const bJson = b.file.toLowerCase().endsWith(".json") ? 0 : 1;
        return aJson - bJson;
      });

      return uniqueDataSources([...configured, ...manifestSources, ...discovered])
        .sort((a, b) => a.company.localeCompare(b.company, "ko-KR") || String(b.year || "").localeCompare(String(a.year || "")));
    }

    function renderMetricOptions() {
      els.metricSelect.innerHTML = metricDefs
        .map((metric) => `<option value="${metric.id}">${metric.label}</option>`)
        .join("");
      els.metricSelect.value = state.selectedMetric;
    }

    function renderMetrics() {
      els.metrics.innerHTML = metricDefs.map((metric) => {
        const values = getMetricValues(metric);
        const current = values.current;
        const previous = values.previous;
        const rate = changeRate(current, previous);
        const direction = rate === null ? "" : rate >= 0 ? "up" : "down";
        const compareLabel = values.previousLabel && values.currentLabel
          ? `${values.previousLabel} 대비`
          : "전기 대비";
        return `
          <article class="metric-card">
            <h3>${metric.label}</h3>
            <div class="metric-value">${formatAmount(current)}</div>
            <div class="metric-change ${direction}">${compareLabel} ${formatPercent(rate)}</div>
          </article>
        `;
      }).join("");
    }

    function renderTrendChart() {
      const metric = metricDefs.find((item) => item.id === state.selectedMetric) || metricDefs[0];
      const points = getMetricPoints(metric);
      const row = points.length ? points[points.length - 1].row : findMetric(metric);
      if (!row) {
        els.trendChart.innerHTML = `<div class="empty">선택한 지표 데이터가 없습니다.</div>`;
        return;
      }

      const periods = points.length >= 2 ? points : getPeriods(row);
      const max = Math.max(...periods.map((period) => Math.abs(period.value || 0)), 1);
      const periodLabel = points.length >= 2
        ? `${points[0].label}-${points[points.length - 1].label}`
        : "최근 3개 기수";
      els.trendMeta.textContent = `${metric.label} · ${periodLabel} · ${row.currency || "KRW"}`;
      els.trendChart.innerHTML = periods.map((period) => {
        const height = Math.max(3, Math.round((Math.abs(period.value || 0) / max) * 100));
        return `
          <div class="trend-column">
            <div class="trend-bar-wrap">
              <div class="trend-bar" style="height:${height}%"></div>
            </div>
            <div class="trend-value">${formatAmount(period.value)}</div>
            <div class="trend-label">${period.label}</div>
          </div>
        `;
      }).join("");
    }

    function statementCounts() {
      return state.rows.reduce((acc, row) => {
        const years = new Set(recentYearsForStatement(row.sj_div));
        if (!years.has(rowYear(row))) return acc;
        acc[row.sj_div] = (acc[row.sj_div] || 0) + 1;
        return acc;
      }, {});
    }

    function renderTabs() {
      const counts = statementCounts();
      const available = Object.keys(statementLabels).filter((key) => counts[key]);
      if (!available.includes(state.selectedStatement)) {
        state.selectedStatement = available[0] || "BS";
      }

      els.statementTabs.innerHTML = available.map((key) => `
        <button class="statement-tab ${key === state.selectedStatement ? "active" : ""}" data-statement="${key}">
          <span>${statementLabels[key]}</span>
          <span class="count">${counts[key]}</span>
        </button>
      `).join("");
    }

    function filteredRows() {
      const query = state.query.trim().toLowerCase();
      return rowsForActiveStatement()
        .filter((row) => {
          if (!query) return true;
          return `${row.account_nm} ${row.account_id} ${row.account_detail || ""}`
            .toLowerCase()
            .includes(query);
        })
        .sort((a, b) => {
          const yearDiff = (rowYear(b) || 0) - (rowYear(a) || 0);
          return yearDiff || a.ord - b.ord;
        });
    }

    function renderFacts() {
      const activeRows = rowsForActiveStatement();
      const first = activeRows[0] || state.rows[0] || {};
      const counts = statementCounts();
      const total = activeRows.length;
      const source = state.currentSource || {};
      const years = activeStatementYears().join(" / ");
      els.facts.innerHTML = `
        <div class="fact-row"><span>기업</span><strong>${source.company || "-"}</strong></div>
        <div class="fact-row"><span>사업연도</span><strong>${years || first.bsns_year || "-"}</strong></div>
        <div class="fact-row"><span>보고서</span><strong>${first.reprt_code || "-"}</strong></div>
        <div class="fact-row"><span>접수번호</span><strong>${first.rcept_no || "-"}</strong></div>
        <div class="fact-row"><span>통화</span><strong>${first.currency || "KRW"}</strong></div>
        <div class="fact-row"><span>전체 항목</span><strong>${total.toLocaleString("ko-KR")}</strong></div>
        <div class="fact-row"><span>선택 항목</span><strong>${(counts[state.selectedStatement] || 0).toLocaleString("ko-KR")}</strong></div>
      `;
    }

    function renderStatementComparisonChart(rows) {
      const years = activeStatementYears();
      if (years.length < 2) {
        els.statementChart.className = "statement-chart";
        els.statementChart.innerHTML = `<div class="empty">비교할 최근 2개 연도 데이터가 없습니다.</div>`;
        return 0;
      }

      const [latestYear, previousYear] = years;
      const grouped = new Map();

      for (const row of rows) {
        const year = rowYear(row);
        if (year !== latestYear && year !== previousYear) continue;

        const amount = parseAmount(row.thstrm_amount);
        if (!Number.isFinite(amount)) continue;

        const detail = String(row.account_detail || "").trim();
        const key = `${row.account_id || ""}::${row.account_nm}::${detail}`;
        const current = grouped.get(key) || {
          accountId: row.account_id,
          accountName: row.account_nm,
          accountDetail: detail,
          ord: row.ord,
          latest: null,
          previous: null
        };

        if (year === latestYear) {
          current.latest = amount;
        } else {
          current.previous = amount;
        }
        current.ord = Math.min(current.ord, row.ord);
        grouped.set(key, current);
      }

      const comparisons = Array.from(grouped.values())
        .filter((item) => Number.isFinite(item.latest) || Number.isFinite(item.previous))
        .sort((a, b) => a.ord - b.ord || a.accountName.localeCompare(b.accountName, "ko-KR"));

      if (!comparisons.length) {
        els.statementChart.className = "statement-chart";
        els.statementChart.innerHTML = `<div class="empty">표시할 금액 데이터가 없습니다.</div>`;
        return 0;
      }

      els.statementChart.className = "statement-chart compare-chart";
      els.statementChart.innerHTML = `
        <div class="compare-legend">
          <span class="legend-item"><span class="legend-dot"></span>${latestYear}</span>
          <span class="legend-item"><span class="legend-dot previous"></span>${previousYear}</span>
        </div>
        <div class="compare-grid">
          ${comparisons.map((item) => {
            const max = Math.max(Math.abs(item.latest || 0), Math.abs(item.previous || 0), 1);
            const latestWidth = Number.isFinite(item.latest) && item.latest !== 0
              ? Math.max(2, Math.round((Math.abs(item.latest) / max) * 100))
              : 0;
            const previousWidth = Number.isFinite(item.previous) && item.previous !== 0
              ? Math.max(2, Math.round((Math.abs(item.previous) / max) * 100))
              : 0;
            const rate = changeRate(item.latest, item.previous);
            const direction = rate === null ? "" : rate >= 0 ? "up" : "down";
            return `
              <div class="compare-row">
                <div class="compare-label">
                  <span class="compare-name" title="${escapeHtml(item.accountName)}">${escapeHtml(item.accountName)}</span>
                  <span class="compare-id">${escapeHtml(item.accountId || "-")}</span>
                  ${item.accountDetail ? `<span class="compare-detail" title="${escapeHtml(item.accountDetail)}">${escapeHtml(item.accountDetail)}</span>` : ""}
                </div>
                <div class="compare-bars">
                  <div class="compare-bar-line">
                    <span class="compare-year">${latestYear}</span>
                    <div class="compare-track">
                      <div class="compare-fill latest" style="width:${latestWidth}%"></div>
                    </div>
                    <span class="compare-amount">${formatAmount(item.latest)}</span>
                  </div>
                  <div class="compare-bar-line previous">
                    <span class="compare-year">${previousYear}</span>
                    <div class="compare-track">
                      <div class="compare-fill previous" style="width:${previousWidth}%"></div>
                    </div>
                    <span class="compare-amount">${formatAmount(item.previous)}</span>
                  </div>
                </div>
                <div class="compare-change ${direction}">${formatPercent(rate)}</div>
              </div>
            `;
          }).join("")}
        </div>
      `;
      return comparisons.length;
    }

    function renderStatement() {
      const rows = filteredRows();
      const sourceRows = rowsForActiveStatement();
      const title = statementLabels[state.selectedStatement] || state.selectedStatement;
      const period = `${activeStatementYears().join(" / ")} 비교`;
      els.statementTitle.textContent = title;
      renderFacts();
      const displayedCount = renderStatementComparisonChart(rows);
      els.statementMeta.textContent = `${period} · ${displayedCount.toLocaleString("ko-KR")}개 항목 표시 · ${sourceRows.length.toLocaleString("ko-KR")}개 연도별 데이터`;
    }

    function renderAll() {
      if (!state.rows.length) {
        els.metrics.innerHTML = "";
        els.trendChart.innerHTML = `<div class="empty">데이터가 없습니다.</div>`;
        els.statementTabs.innerHTML = "";
        els.statementChart.innerHTML = "";
        return;
      }

      renderMetricOptions();
      renderMetrics();
      renderTrendChart();
      renderTabs();
      renderStatement();
    }

    function loadRows(rows, source) {
      state.currentSource = source;
      state.rows = normalizeRows(rows);
      state.query = "";
      els.searchInput.value = "";
      renderHeader();
      renderCompanySelect();
      setStatus(`${source.label} · ${state.rows.length.toLocaleString("ko-KR")}개 항목`);
      renderAll();
    }

    async function loadDataSource(source) {
      try {
        setStatus(`${source.label} 로딩 중`);
        if (source.rows) {
          loadRows(source.rows, source);
          return;
        }
        const response = await fetch(source.file, { cache: "no-store" });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const text = await response.text();
        const rows = source.file.toLowerCase().endsWith(".csv") ? parseCsv(text) : JSON.parse(text);
        loadRows(rows, source);
      } catch (error) {
        setStatus(`${source.label} 파일을 읽지 못했습니다: ${error.message}`);
      }
    }

    async function initializeDataSources() {
      state.dataSources = await discoverDataSources();
      renderCompanySelect();

      if (!state.dataSources.length) {
        setStatus("데이터 파일이 없습니다. JSON 또는 CSV 파일을 선택하세요.");
        renderHeader();
        renderAll();
        return;
      }

      await loadDataSource(state.dataSources[0]);
    }

    async function loadSelectedFile(file) {
      const text = await file.text();
      const rows = file.name.toLowerCase().endsWith(".csv") ? parseCsv(text) : JSON.parse(text);
      const inferred = inferDataSource(file.name);
      const source = {
        ...inferred,
        company: inferred.company || "사용자 파일",
        label: `${inferred.label} · 사용자 파일`,
        file: file.name,
        rows
      };
      state.dataSources = uniqueDataSources([source, ...state.dataSources]);
      loadRows(rows, source);
    }

    els.metricSelect.addEventListener("change", (event) => {
      state.selectedMetric = event.target.value;
      renderTrendChart();
    });

    els.statementTabs.addEventListener("click", (event) => {
      const button = event.target.closest("[data-statement]");
      if (!button) return;
      state.selectedStatement = button.dataset.statement;
      renderTabs();
      renderStatement();
    });

    els.searchInput.addEventListener("input", (event) => {
      state.query = event.target.value;
      renderStatement();
    });

    els.companySelect.addEventListener("change", async (event) => {
      const source = state.dataSources[Number(event.target.value)];
      if (!source) return;
      await loadDataSource(source);
    });

    els.fileInput.addEventListener("change", async (event) => {
      const file = event.target.files && event.target.files[0];
      if (!file) return;
      try {
        await loadSelectedFile(file);
      } catch (error) {
        setStatus(`파일을 읽지 못했습니다: ${error.message}`);
      }
    });

    initializeDataSources();
  </script>
</body>
</html>
